<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mathematics | NDAVerse</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .math-hero { text-align: center; padding: 120px 5% 40px; }
        .math-hero h1 { font-size: 48px; margin-bottom: 10px; }
        .back-link { color: #33b5ff; text-decoration: none; display: inline-block; margin-top: 15px; }
        .chapter-section { padding: 40px 5%; max-width: 900px; margin: 0 auto; }
        
        #searchInput { 
            width: 100%; padding: 15px; border-radius: 12px; background: rgba(255,255,255,0.05); 
            border: 1px solid rgba(255,255,255,0.1); color: white; margin-bottom: 30px; 
        }

        .chapter-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 25px;
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .num-circle { 
            width: 60px; height: 60px; border: 2px solid #33b5ff; 
            border-radius: 50%; display: flex; align-items: center; 
            justify-content: center; font-weight: 800; color: #33b5ff; font-size: 20px;
            flex-shrink: 0;
        }

        .card-content { flex-grow: 1; }
        .card-content h3 { color: #fff; margin-bottom: 5px; }
        .card-content p { color: #94a3b8; font-size: 14px; }
        
        .arrow-btn { 
            background: rgba(51, 181, 255, 0.1); border: 1px solid #33b5ff;
            color: #33b5ff; padding: 15px 20px; border-radius: 12px; text-decoration: none;
        }

        @media (max-width: 600px) {
            .chapter-card { flex-direction: column; text-align: center; }
            .math-hero h1 { font-size: 32px; }
            .arrow-btn { width: 100%; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">NDAVerse</div>
        <nav>
            <a href="index.html">Home</a>
            <a href="index.html#subjects">Subjects</a>
        </nav>
    </header>

    <section class="math-hero">
        <h1>Mathematics</h1>
        <p>Explore chapters and notes</p>
        <a href="index.html#subjects" class="back-link">← Back to Home</a>
    </section>

    <section class="chapter-section">
        <input type="text" id="searchInput" placeholder="🔍 Search chapters..." oninput="doSearch()">
        
        <h2 style="margin-bottom: 20px;">📖 Chapters</h2>
        
        <div id="chapterList">
            <div class="chapter-card">
                <div class="num-circle">1</div>
                <div class="card-content">
                    <h3>Basic Mathematics</h3>
                    <p>Foundational concepts and essential mathematical principles.</p>
                </div>
                <a href="math-chapter-1.html" class="arrow-btn">→</a>
            </div>
        </div>
    </section>

    <footer>
        <p>© 2026 NDAVerse. All rights reserved. | Built with ❤️ by <span>Neharsh Shende</span></p>
    </footer>

    <script>
        function doSearch() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const cards = document.querySelectorAll('.chapter-card');
            cards.forEach(card => {
                const title = card.querySelector('h3').innerText.toLowerCase();
                card.style.display = title.includes(query) ? "flex" : "none";
            });
        }
    </script>
</body>
</html>
